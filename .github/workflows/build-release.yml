name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DrawTaxi-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        body: | 
          Nouvelle version de l'application DrawTaxi.
          
          **Changements :**
          - Navigation MapLibre optimisée
          - Calcul de rentabilité exact (9€ base + 2,50€/km)
          - Géocodage priorisé Brest/Finistère
          
          Téléchargez l'APK ci-dessous pour l'installer sur Android.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}